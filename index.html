<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FC Saint-Prex</title>
<style>
:root{
  --red:#c0161a;--red-dark:#8b0f12;--red-light:#fdecea;
  --white:#fff;--gray-1:#f7f8fa;--gray-2:#eef0f3;--gray-3:#d0d4db;
  --gray-4:#8a919e;--gray-5:#3d4450;--black:#1a1d23;
  --radius:10px;--shadow:0 2px 12px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-1);color:var(--black);min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,#8b0f12 0%,#c0161a 40%,#6b0a0c 100%);}
.login-box{background:#fff;border-radius:18px;padding:32px 28px;width:320px;max-width:90vw;box-shadow:0 24px 64px rgba(0,0,0,0.4);text-align:center;}
.login-box img{width:80px;height:80px;object-fit:contain;border-radius:8px;margin-bottom:10px;}
.login-box h1{font-size:17px;font-weight:800;color:var(--red);letter-spacing:1px;margin-bottom:2px;}
.login-box p{font-size:11px;color:var(--gray-4);font-style:italic;margin-bottom:22px;}
.login-box label{display:block;font-size:11px;font-weight:700;color:var(--gray-5);margin-bottom:4px;text-align:left;text-transform:uppercase;letter-spacing:.5px;}
.login-box select{width:100%;padding:11px 12px;border:1.5px solid var(--gray-3);border-radius:8px;font-size:15px;margin-bottom:14px;outline:none;background:#fff;-webkit-appearance:none;appearance:none;}
#btn-login{width:100%;background:var(--red);color:#fff;border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;-webkit-appearance:none;}

/* APP */
#app{display:none;}
.topbar{background:var(--red);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.topbar-left{display:flex;align-items:center;gap:8px;}
.topbar img{width:32px;height:32px;object-fit:contain;border-radius:4px;filter:brightness(0) invert(1);}
.topbar h2{font-size:14px;font-weight:800;letter-spacing:.8px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.user-badge{font-size:11px;background:rgba(255,255,255,0.18);padding:3px 9px;border-radius:20px;}
#btn-logout{background:none;border:1.5px solid rgba(255,255,255,0.4);color:#fff;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;}

.search-wrap{background:#fff;border-bottom:1.5px solid var(--gray-2);padding:8px 16px;display:none;}
.search-input{width:100%;padding:8px 14px;border:1.5px solid var(--gray-3);border-radius:20px;font-size:14px;outline:none;background:var(--gray-1);}
.search-input:focus{border-color:var(--red);background:#fff;}

.nav-tabs{display:flex;background:#fff;border-bottom:1.5px solid var(--gray-2);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.nav-tab{padding:12px 14px;font-size:13px;font-weight:500;color:var(--gray-4);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;flex-shrink:0;}
.nav-tab.active{color:var(--red);border-bottom-color:var(--red);font-weight:700;}

.content{padding:16px;max-width:1100px;margin:0 auto;}
.section{display:none;}
.section.active{display:block;}

.card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;}
.card-title{font-size:14px;font-weight:700;color:var(--gray-5);margin-bottom:12px;}

.group-tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.group-tab{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--gray-3);color:var(--gray-4);background:#fff;}
.group-tab.active{background:var(--red);color:#fff;border-color:var(--red);}

.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.player-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center;cursor:pointer;border:2px solid transparent;}
.player-card:active{border-color:var(--red);}
.player-avatar{width:48px;height:48px;border-radius:50%;background:var(--red-light);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:16px;font-weight:700;color:var(--red);}
.player-photo{width:48px;height:48px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:block;}
.player-name{font-size:12px;font-weight:600;color:var(--black);line-height:1.3;}
.player-job{font-size:11px;color:var(--gray-4);margin-top:2px;}
.player-group-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-top:5px;background:var(--red-light);color:var(--red);}
.captain-tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:3px;background:#FFD700;color:#5a4500;}

.test-tabs{display:flex;gap:8px;margin-bottom:12px;}
.test-tab{padding:6px 14px;border-radius:16px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--gray-3);color:var(--gray-4);background:#fff;}
.test-tab.active{background:var(--red);color:#fff;border-color:var(--red);}

.fitness-table{width:100%;border-collapse:collapse;font-size:12px;}
.fitness-table th{text-align:left;padding:7px 8px;font-size:11px;font-weight:600;color:var(--gray-4);text-transform:uppercase;border-bottom:1.5px solid var(--gray-2);}
.fitness-table td{padding:9px 8px;border-bottom:1px solid var(--gray-2);}
.fitness-table tr:last-child td{border-bottom:none;}
.rank-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;}
.r1{background:#FFD700;color:#5a4500;}.r2{background:#C0C0C0;color:#3a3a3a;}.r3{background:#CD7F32;color:#fff;}.r0{background:var(--gray-2);color:var(--gray-5);}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.pg{background:#e8f5ee;color:#1a6b3c;}.pa{background:#fff8e1;color:#856404;}.pl{background:var(--red-light);color:var(--red);}
.eu{color:#1a6b3c;font-weight:600;}.ed{color:var(--red);font-weight:600;}

.bday-list{display:flex;flex-direction:column;gap:8px;}
.bday-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--gray-1);}
.bday-row.soon{background:#fff8e1;border-left:3px solid #f0c040;}
.bday-row.today{background:linear-gradient(90deg,#fdecea,#fff5f5);border-left:4px solid var(--red);box-shadow:0 2px 10px rgba(192,22,26,0.15);}
.bday-row.today .bday-name{color:var(--red);font-weight:700;}
.bday-avatar{width:34px;height:34px;border-radius:50%;background:var(--red-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--red);flex-shrink:0;}
.bday-row.today .bday-avatar{background:var(--red);color:#fff;}
.bday-name{font-size:13px;font-weight:600;}
.bday-date{font-size:11px;color:var(--gray-4);}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.85;transform:scale(1.06);}}
.bday-today-badge{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;animation:pulse 1.2s infinite;}
.bday-soon-badge{font-size:11px;font-weight:600;color:#856404;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;-webkit-overflow-scrolling:touch;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;width:480px;max-width:95vw;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal-header{padding:15px 18px;display:flex;align-items:center;justify-content:space-between;background:var(--red);border-radius:14px 14px 0 0;}
.modal-header h3{font-size:15px;font-weight:700;color:#fff;}
.modal-close{background:none;border:none;font-size:26px;cursor:pointer;color:rgba(255,255,255,0.85);line-height:1;padding:0 4px;}
.modal-body{padding:20px;}
.profile-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.profile-avatar-lg{width:62px;height:62px;border-radius:50%;background:var(--red-light);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--red);flex-shrink:0;}
.profile-photo-lg{width:62px;height:62px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.profile-info h4{font-size:16px;font-weight:700;}
.profile-info p{font-size:12px;color:var(--gray-4);margin-top:2px;}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-2);font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-label{color:var(--gray-4);}
.info-value{font-weight:500;}
.fs-title{font-size:11px;font-weight:700;color:var(--gray-5);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px;}
.mini-chart{display:flex;align-items:flex-end;gap:6px;height:60px;margin-bottom:5px;}
.mini-bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;}
.mini-bar{background:var(--red);border-radius:3px 3px 0 0;width:100%;opacity:.82;}
.mini-bar-label{font-size:9px;color:var(--gray-4);margin-top:2px;}
.mini-bar-val{font-size:9px;font-weight:600;color:var(--red);margin-bottom:2px;}

.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--gray-5);margin-bottom:4px;text-transform:uppercase;}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-3);border-radius:8px;font-size:14px;outline:none;background:#fff;-webkit-appearance:none;}
.result-preview{background:var(--red-light);border-radius:8px;padding:10px 14px;margin-top:8px;display:none;}
.result-preview .val{font-size:20px;font-weight:700;color:var(--red);}
.edit-field{width:100%;padding:9px 11px;border:1.5px solid var(--gray-3);border-radius:6px;font-size:13px;outline:none;background:#fff;-webkit-appearance:none;margin-bottom:8px;}
.btn-red{background:var(--red);color:#fff;border:none;padding:10px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;}
.admin-only{display:none;}
.admin-only.visible{display:block;}
.tab-admin-only{display:none!important;}
.tab-admin-only.visible{display:flex!important;}
.no-results{padding:28px;text-align:center;color:var(--gray-4);font-size:14px;}
.alert-locked{background:#f7f8fa;border-radius:8px;padding:12px;font-size:13px;color:var(--gray-4);margin-top:12px;}
</style>
</head>

var currentRole='player',currentUser=PLAYERS[0],activeGJ='+30',activeGF='+30',activeTest='cooper';

function calcVO2(d){return ((d/1000)-0.3138)/0.0278;}
function vo2Lv(v){return v>=48?{l:'Excellent',c:'pg'}:v>=42?{l:'Bon',c:'pg'}:v>=35?{l:'Moyen',c:'pa'}:{l:'Faible',c:'pl'};}
function spLv(t){return t<=4.0?{l:'Excellent',c:'pg'}:t<=4.5?{l:'Bon',c:'pg'}:t<=5.0?{l:'Moyen',c:'pa'}:{l:'Faible',c:'pl'};}
function age(b){var d=new Date(b),n=new Date(),a=n.getFullYear()-d.getFullYear();if(n<new Date(n.getFullYear(),d.getMonth(),d.getDate()))a--;return a;}
function nextBday(b){
  var d=new Date(b),n=new Date();
  var today=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  var nx=new Date(n.getFullYear(),d.getMonth(),d.getDate());
  if(nx.getTime()===today.getTime())return 0;
  if(nx<today)nx=new Date(n.getFullYear()+1,d.getMonth(),d.getDate());
  return Math.ceil((nx-today)/86400000);
}
function getPhoto(id){return PHOTOS[id]||null;}
function setPhoto(id,url){PHOTOS[id]=url;}

function avatarCard(p){
  var ph=getPhoto(p.id);
  if(ph)return '<img src="'+ph+'" class="player-photo" alt="'+p.name+'">';
  return '<div class="player-avatar">'+p.initials+'</div>';
}
function avatarLg(p){
  var ph=getPhoto(p.id);
  if(ph)return '<img src="'+ph+'" class="profile-photo-lg" alt="'+p.name+'">';
  return '<div class="profile-avatar-lg">'+p.initials+'</div>';
}

function pcHtml(p){
  return '<div class="player-card" data-pid="'+p.id+'">'+
    avatarCard(p)+
    '<div class="player-name">'+p.name+(p.captain?'<span class="captain-tag">C</span>':'')+'</div>'+
    '<div class="player-job">'+(p.position||p.job)+'</div>'+
    '<span class="player-group-tag">Seniors '+p.group+'</span></div>';
}

function buildGroupTabs(cid,active,cb){
  var groups=(currentRole==='admin'||cid==='gtabs-joueurs')?GROUPS:[currentUser.group];
  var el=document.getElementById(cid);
  el.innerHTML='';
  groups.forEach(function(g){
    var d=document.createElement('div');
    d.className='group-tab'+(g===active?' active':'');
    d.textContent=g;
    d.addEventListener('click',function(){
      el.querySelectorAll('.group-tab').forEach(function(t){t.classList.remove('active');});
      d.classList.add('active');
      cb(g);
    });
    el.appendChild(d);
  });
}

function renderGrid(){
  var grid=document.getElementById('players-grid');
  grid.innerHTML='';
  PLAYERS.filter(function(p){return p.group===activeGJ;}).forEach(function(p){
    grid.innerHTML+=pcHtml(p);
  });
  grid.querySelectorAll('.player-card').forEach(function(card){
    card.addEventListener('click',function(){openProfile(parseInt(card.dataset.pid));} );
  });
}

function doSearch(v){
  var sr=document.getElementById('search-results'),pg=document.getElementById('players-by-group');
  if(!v.trim()){sr.style.display='none';pg.style.display='block';return;}
  var q=v.toLowerCase();
  var found=PLAYERS.filter(function(p){
    return p.name.toLowerCase().indexOf(q)>=0||(p.position&&p.position.toLowerCase().indexOf(q)>=0)||p.group.indexOf(q)>=0||(p.job&&p.job.toLowerCase().indexOf(q)>=0);
  });
  sr.style.display='block';pg.style.display='none';
  var grid=document.getElementById('search-grid');
  grid.innerHTML=found.length?found.map(pcHtml).join(''):'<div class="no-results">Aucun joueur trouvé</div>';
  grid.querySelectorAll('.player-card').forEach(function(card){
    card.addEventListener('click',function(){openProfile(parseInt(card.dataset.pid));});
  });
}

function renderFitness(){
  var canSee=currentRole==='admin'||activeGF===currentUser.group;
  var fc=document.getElementById('fitness-content');
  if(!canSee){fc.innerHTML='<div class="card"><p class="alert-locked">🔒 Données fitness visibles uniquement pour votre groupe (Seniors '+currentUser.group+')</p></div>';return;}
  var gp=PLAYERS.filter(function(p){return p.group===activeGF;});
  if(activeTest==='cooper'){
    var ranked=gp.filter(function(p){return p.cooper.length>0;}).map(function(p){
      var last=p.cooper[p.cooper.length-1],prev=p.cooper.length>=2?p.cooper[p.cooper.length-2]:null;
      return {p:p,last:last,vo2:calcVO2(last.dist),evol:prev?last.dist-prev.dist:null};
    }).sort(function(a,b){return b.vo2-a.vo2;});
    var rows=ranked.map(function(r,i){
      var lv=vo2Lv(r.vo2),rc=i===0?'r1':i===1?'r2':i===2?'r3':'r0';
      var ev=r.evol!==null?(r.evol>=0?'<span class="eu">▲ +'+r.evol+'m</span>':'<span class="ed">▼ '+r.evol+'m</span>'):'—';
      return '<tr><td><span class="rank-num '+rc+'">'+(i+1)+'</span></td><td style="font-weight:500;cursor:pointer" data-pid="'+r.p.id+'">'+r.p.name+'</td><td>'+r.last.dist+'m</td><td><span class="pill '+lv.c+'">'+r.vo2.toFixed(1)+' — '+lv.l+'</span></td><td>'+ev+'</td><td style="color:var(--gray-4);font-size:11px">'+r.last.date+'</td></tr>';
    }).join('');
    var nt=gp.filter(function(p){return p.cooper.length===0;}).map(function(p){
      return '<tr><td><span class="rank-num r0">—</span></td><td>'+p.name+'</td><td colspan="4" style="color:var(--gray-4)">Pas encore testé</td></tr>';
    }).join('');
    fc.innerHTML='<div class="card"><div class="card-title">🏃 Cooper — Seniors '+activeGF+'</div><table class="fitness-table"><thead><tr><th>#</th><th>Joueur</th><th>Distance</th><th>VO2max</th><th>Évolution</th><th>Date</th></tr></thead><tbody>'+rows+nt+'</tbody></table></div>';
  }else{
    var ranked=gp.filter(function(p){return p.sprint.length>0;}).map(function(p){
      var last=p.sprint[p.sprint.length-1],prev=p.sprint.length>=2?p.sprint[p.sprint.length-2]:null;
      return {p:p,last:last,evol:prev?last.time-prev.time:null};
    }).sort(function(a,b){return a.last.time-b.last.time;});
    var rows=ranked.map(function(r,i){
      var lv=spLv(r.last.time),rc=i===0?'r1':i===1?'r2':i===2?'r3':'r0';
      var ev=r.evol!==null?(r.evol<=0?'<span class="eu">▲ '+r.evol.toFixed(2)+'s</span>':'<span class="ed">▼ +'+r.evol.toFixed(2)+'s</span>'):'—';
      return '<tr><td><span class="rank-num '+rc+'">'+(i+1)+'</span></td><td style="font-weight:500;cursor:pointer" data-pid="'+r.p.id+'">'+r.p.name+'</td><td>'+r.last.time.toFixed(2)+'s</td><td><span class="pill '+lv.c+'">'+lv.l+'</span></td><td>'+ev+'</td><td style="color:var(--gray-4);font-size:11px">'+r.last.date+'</td></tr>';
    }).join('');
    var nt=gp.filter(function(p){return p.sprint.length===0;}).map(function(p){
      return '<tr><td><span class="rank-num r0">—</span></td><td>'+p.name+'</td><td colspan="4" style="color:var(--gray-4)">Pas encore testé</td></tr>';
    }).join('');
    fc.innerHTML='<div class="card"><div class="card-title">⚡ 30m Sprint — Seniors '+activeGF+'</div><table class="fitness-table"><thead><tr><th>#</th><th>Joueur</th><th>Temps</th><th>Niveau</th><th>Évolution</th><th>Date</th></tr></thead><tbody>'+rows+nt+'</tbody></table></div>';
  }
  fc.querySelectorAll('td[data-pid]').forEach(function(td){
    td.addEventListener('click',function(){openProfile(parseInt(td.dataset.pid));});
  });
}

function renderBdays(){
  var sorted=PLAYERS.map(function(p){return Object.assign({},p,{days:nextBday(p.born)});} ).sort(function(a,b){return a.days-b.days;});
  var html='<div class="bday-list">';
  sorted.forEach(function(p){
    var d=new Date(p.born);
    var lbl=('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2)+' — '+(age(p.born)+1)+' ans';
    var cls=p.days===0?'today':p.days<=14?'soon':'';
    var badge=p.days===0?'<span class="bday-today-badge">🎂 Aujourd\'hui!</span>':p.days<=14?'<span class="bday-soon-badge">dans '+p.days+'j</span>':'<span style="font-size:11px;color:var(--gray-4)">dans '+p.days+'j</span>';
    html+='<div class="bday-row '+cls+'"><div class="bday-avatar">'+p.initials+'</div><div style="flex:1"><div class="bday-name">'+p.name+' <span style="font-size:11px;color:var(--gray-4)">('+p.group+')</span></div><div class="bday-date">'+lbl+'</div></div>'+badge+'</div>';
  });
  html+='</div>';
  document.getElementById('birthday-list').innerHTML=html;
}

function openProfile(id){
  var p=PLAYERS.find(function(x){return x.id===id;});
  var canSee=currentRole==='admin'||p.group===currentUser.group;
  var isOwn=currentRole!=='admin'&&p.id===currentUser.id;
  var fHtml='';
  if(canSee){
    if(p.cooper.length>0){
      var mx=Math.max.apply(null,p.cooper.map(function(t){return t.dist;}));
      var lv=vo2Lv(calcVO2(p.cooper[p.cooper.length-1].dist));
      fHtml+='<div class="fs-title">🏃 Cooper — VO2max</div><div class="mini-chart">';
      p.cooper.forEach(function(t){
        var h=Math.round((t.dist/mx)*55);
        fHtml+='<div class="mini-bar-wrap"><div class="mini-bar-val">'+calcVO2(t.dist).toFixed(0)+'</div><div class="mini-bar" style="height:'+h+'px"></div><div class="mini-bar-label">'+t.date.slice(0,7)+'</div></div>';
      });
      fHtml+='</div><span class="pill '+lv.c+'">VO2max: '+calcVO2(p.cooper[p.cooper.length-1].dist).toFixed(1)+' — '+lv.l+'</span>';
    }
    if(p.sprint.length>0){
      var mn=Math.min.apply(null,p.sprint.map(function(t){return t.time;}));
      var lv=spLv(p.sprint[p.sprint.length-1].time);
      fHtml+='<div class="fs-title" style="margin-top:14px">⚡ 30m Sprint</div><div class="mini-chart">';
      p.sprint.forEach(function(t){
        var h=Math.round((mn/t.time)*55);
        fHtml+='<div class="mini-bar-wrap"><div class="mini-bar-val">'+t.time.toFixed(2)+'</div><div class="mini-bar" style="height:'+h+'px;opacity:.75"></div><div class="mini-bar-label">'+t.date.slice(0,7)+'</div></div>';
      });
      fHtml+='</div><span class="pill '+lv.c+'">Dernier: '+p.sprint[p.sprint.length-1].time.toFixed(2)+'s — '+lv.l+'</span>';
    }
    if(!p.cooper.length&&!p.sprint.length)fHtml='<p style="color:var(--gray-4);font-size:13px;margin-top:10px">Aucun test enregistré.</p>';
  }else{
    fHtml='<p class="alert-locked">🔒 Données fitness visibles uniquement dans votre groupe.</p>';
  }

  var editHtml=isOwn?'<div style="margin-top:16px;padding-top:12px;border-top:1.5px solid var(--gray-2)"><div class="card-title" style="margin-bottom:8px">✏️ Modifier mon profil</div><input class="edit-field" id="edit-job" placeholder="Profession" value="'+(p.job==='—'?'':p.job)+'"><input class="edit-field" id="edit-tel" placeholder="Téléphone" value="'+(p.tel==='—'?'':p.tel)+'"><div style="margin-bottom:8px"><label style="display:inline-block;cursor:pointer;border:1.5px dashed var(--gray-3);border-radius:8px;padding:7px 14px;font-size:12px;color:var(--gray-4)">📷 Choisir une photo<input type="file" accept="image/*" id="photo-input" style="display:none"></label><div style="font-size:10px;color:var(--gray-4);margin-top:3px">Enregistré localement</div></div><button class="btn-red" type="button" id="btn-save-profile">Enregistrer</button></div>':'';

  document.getElementById('modal-title').textContent=isOwn?'Mon profil':'Profil joueur';
  document.getElementById('modal-body').innerHTML=
    '<div class="profile-header"><div id="prof-photo">'+avatarLg(p)+'</div><div class="profile-info"><h4>'+p.name+(p.captain?' <span class="captain-tag">Capitaine</span>':'')+'</h4><p>Seniors '+p.group+'</p></div></div>'+
    '<div class="info-row"><span class="info-label">Poste</span><span class="info-value">'+(p.position||'—')+'</span></div>'+
    '<div class="info-row"><span class="info-label">Profession</span><span class="info-value" id="disp-job">'+(p.job||'—')+'</span></div>'+
    '<div class="info-row"><span class="info-label">Téléphone</span><span class="info-value">'+(p.tel&&p.tel!=='—'?'<a href="tel:'+p.tel+'" style="color:var(--red);font-weight:600">'+p.tel+'</a>':p.tel||'—')+'</span></div>'+
    '<div class="info-row"><span class="info-label">Né le</span><span class="info-value">'+p.born+'</span></div>'+
    '<div class="info-row"><span class="info-label">Âge</span><span class="info-value">'+age(p.born)+' ans</span></div>'+
    fHtml+editHtml;

  if(isOwn){
    var photoIn=document.getElementById('photo-input');
    if(photoIn)photoIn.addEventListener('change',function(){
      var file=this.files[0];if(!file)return;
      var reader=new FileReader();
      reader.onload=function(e){
        setPhoto(p.id,e.target.result);
        document.getElementById('prof-photo').innerHTML='<img src="'+e.target.result+'" class="profile-photo-lg">';
        renderGrid();
      };
      reader.readAsDataURL(file);
    });
    var saveBtn=document.getElementById('btn-save-profile');
    if(saveBtn)saveBtn.addEventListener('click',function(){
      var job=document.getElementById('edit-job').value.trim();
      var tel=document.getElementById('edit-tel').value.trim();
      if(job)p.job=job;if(tel)p.tel=tel;
      document.getElementById('disp-job').textContent=p.job;
      renderGrid();alert('Profil mis à jour!');
    });
  }
  document.getElementById('modal').classList.add('open');
}

function showSection(id){
  ['joueurs','fitness','birthdays','admin'].forEach(function(s){
    document.getElementById('sec-'+s).classList.remove('active');
    document.getElementById('tab-'+s).classList.remove('active');
  });
  document.getElementById('sec-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('search-wrap').style.display=id==='joueurs'?'block':'none';
  if(id==='joueurs'){document.getElementById('search-input').value='';doSearch('');}
}

function calcPreview(){
  var type=document.getElementById('admin-test-type').value;
  var pr=document.getElementById('result-preview');
  if(type==='cooper'){
    var d=parseFloat(document.getElementById('admin-dist').value);
    if(!d||d<500){pr.style.display='none';return;}
    var v=calcVO2(d),lv=vo2Lv(v);
    document.getElementById('preview-label').textContent='VO2max estimé';
    document.getElementById('preview-val').textContent=v.toFixed(1)+' ml/kg/min';
    document.getElementById('preview-level').textContent=lv.l;
  }else{
    var s=parseFloat(document.getElementById('admin-time').value);
    if(!s||s<2){pr.style.display='none';return;}
    var lv=spLv(s);
    document.getElementById('preview-label').textContent='Résultat 30m Sprint';
    document.getElementById('preview-val').textContent=s.toFixed(2)+' secondes';
    document.getElementById('preview-level').textContent=lv.l;
  }
  pr.style.display='block';
}

// INIT
document.addEventListener('DOMContentLoaded',function(){

  document.getElementById('btn-login').addEventListener('click',function(){
    currentRole=document.getElementById('login-role').value;
    var uid=parseInt(document.getElementById('login-user').value);
    currentUser=PLAYERS.find(function(p){return p.id===uid;})||PLAYERS[0];
    activeGJ=currentUser.group;activeGF=currentUser.group;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('topbar-user').textContent=currentUser.name+(currentRole==='admin'?' (Coach)':'');
    document.getElementById('search-wrap').style.display='block';
    if(currentRole==='admin'){
      document.querySelectorAll('.admin-only').forEach(function(el){el.classList.add('visible');});
      document.querySelectorAll('.tab-admin-only').forEach(function(el){el.classList.add('visible');});
      var sel=document.getElementById('admin-player');
      sel.innerHTML=PLAYERS.map(function(p){return '<option value="'+p.id+'">'+p.name+' ('+p.group+')</option>';}).join('');
      document.getElementById('admin-date').value=new Date().toISOString().split('T')[0];
    }
    buildGroupTabs('gtabs-joueurs',activeGJ,function(g){activeGJ=g;renderGrid();});
    buildGroupTabs('gtabs-fitness',activeGF,function(g){activeGF=g;renderFitness();});
    renderGrid();renderFitness();renderBdays();
  });

  document.getElementById('btn-logout').addEventListener('click',function(){
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
    document.querySelectorAll('.admin-only').forEach(function(el){el.classList.remove('visible');});
    document.querySelectorAll('.tab-admin-only').forEach(function(el){el.classList.remove('visible');});
  });

  document.getElementById('tab-joueurs').addEventListener('click',function(){showSection('joueurs');});
  document.getElementById('tab-fitness').addEventListener('click',function(){showSection('fitness');});
  document.getElementById('tab-birthdays').addEventListener('click',function(){showSection('birthdays');});
  document.getElementById('tab-admin').addEventListener('click',function(){showSection('admin');});

  document.getElementById('search-input').addEventListener('input',function(){doSearch(this.value);});

  document.getElementById('ttab-cooper').addEventListener('click',function(){
    activeTest='cooper';
    document.getElementById('ttab-cooper').classList.add('active');
    document.getElementById('ttab-sprint').classList.remove('active');
    renderFitness();
  });
  document.getElementById('ttab-sprint').addEventListener('click',function(){
    activeTest='sprint';
    document.getElementById('ttab-sprint').classList.add('active');
    document.getElementById('ttab-cooper').classList.remove('active');
    renderFitness();
  });

  document.getElementById('admin-test-type').addEventListener('change',function(){
    var t=this.value;
    document.getElementById('field-cooper').style.display=t==='cooper'?'block':'none';
    document.getElementById('field-sprint').style.display=t==='sprint'?'block':'none';
    document.getElementById('result-preview').style.display='none';
  });
  document.getElementById('admin-dist').addEventListener('input',calcPreview);
  document.getElementById('admin-time').addEventListener('input',calcPreview);

  document.getElementById('btn-save-result').addEventListener('click',function(){
    var pid=parseInt(document.getElementById('admin-player').value);
    var type=document.getElementById('admin-test-type').value;
    var date=document.getElementById('admin-date').value;
    var p=PLAYERS.find(function(x){return x.id===pid;});
    if(type==='cooper'){
      var dist=parseFloat(document.getElementById('admin-dist').value);
      if(!date||!dist){alert('Veuillez remplir tous les champs.');return;}
      p.cooper.push({date:date,dist:dist});
      p.cooper.sort(function(a,b){return a.date.localeCompare(b.date);});
      document.getElementById('admin-dist').value='';
      alert('Enregistré: '+p.name+' — '+dist+'m → VO2max '+calcVO2(dist).toFixed(1));
    }else{
      var time=parseFloat(document.getElementById('admin-time').value);
      if(!date||!time){alert('Veuillez remplir tous les champs.');return;}
      p.sprint.push({date:date,time:time});
      p.sprint.sort(function(a,b){return a.date.localeCompare(b.date);});
      document.getElementById('admin-time').value='';
      alert('Enregistré: '+p.name+' — '+time.toFixed(2)+'s');
    }
    document.getElementById('result-preview').style.display='none';
    renderFitness();
  });

  document.getElementById('modal-close-btn').addEventListener('click',function(){
    document.getElementById('modal').classList.remove('open');
  });
  document.getElementById('modal').addEventListener('click',function(e){
    if(e.target===this)this.classList.remove('open');
  });

});
</script>
</body>
</html>
